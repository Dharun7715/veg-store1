<!DOCTYPE html>
<html>
<head>
    <title>Cart</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            background: #2c3e50;
            color: white;
        }

        .container {
            max-width: 420px;
            margin: auto;
            padding: 15px;
        }

        .card {
            background: #34495e;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
        }

        .btn {
            padding: 5px 10px;
            background: green;
            color: white;
            border-radius: 6px;
            text-decoration: none;
        }

        .remove {
            background: red;
        }

        .checkout {
            display: block;
            background: orange;
            padding: 10px;
            text-align: center;
            border-radius: 10px;
            margin-top: 10px;
            text-decoration: none;
            color: white;
        }
    </style>
</head>

<body>

<div class="container">

<h2>🛒 Your Cart</h2>

{% for item in items %}
<div class="card">
    <h3>{{ item.name }}</h3>
    <p>₹{{ item.price }} × {{ item.qty }}</p>
    <p>Total: ₹{{ item.total }}</p>

    <a href="/increase/{{ item.name }}" class="btn">➕</a>
    <a href="/decrease/{{ item.name }}" class="btn">➖</a>
    <a href="/remove/{{ item.name }}" class="btn remove">❌ Remove</a>
</div>
{% endfor %}

<h3>Total: ₹{{ total }}</h3>

<a href="/checkout" class="checkout">💳 Checkout</a>

<br><br>
<a href="/">⬅ Back</a>

</div>

</body>
</html>
