<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 320px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #27ae60;
            color: white;
            font-size: 16px;
            margin-top: 10px;
        }

        button:hover {
            background: #219150;
        }

        .title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 13px;
            color: gray;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>

<div class="box">

<div class="title">🥦 Veg Store</div>
<div class="subtitle">Login with your mobile number</div>

<form method="POST">
    <input type="text" name="phone" placeholder="Enter phone number" required>
    <button type="submit">📱 Send OTP</button>
</form>

</div>

</body>
</html>
