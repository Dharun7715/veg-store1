<!DOCTYPE html>
<html>
<head>
    <title>Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 25px;
            border-radius: 20px;
            width: 320px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        h2 {
            margin-bottom: 10px;
        }

        input, textarea {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 10px;
        }

        a {
            display: inline-block;
            margin-top: 10px;
            text-decoration: none;
            color: black;
        }
    </style>
</head>

<body>

<div class="box">

<h2>👤 Profile</h2>

<p><b>Phone:</b> {{ user }}</p>

<form method="POST">
    <input type="text" name="name" placeholder="Your Name" value="{{ name }}">
    <textarea name="address" placeholder="Your Address">{{ address }}</textarea>
    <button type="submit">Save</button>
</form>

<a href="/">⬅ Back to Home</a>

</div>

</body>
</html>
